AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Checkout Service Lambda

Globals:
  Function:
    Runtime: java17
    MemorySize: 1024
    Timeout: 10
    Architectures:
      - x86_64
    Environment:
      Variables:
        ORDERS_TABLE_NAME: !Ref OrdersTable
        IDEMPOTENCY_TABLE_NAME: !Ref IdempotencyTable
        ITEMS_TABLE_NAME: !Ref ItemsTable
        RESERVATIONS_TABLE_NAME: !Ref ReservationsTable

Resources:
  CheckoutApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: io.checkout.service.Handler::handleRequest
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ItemsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReservationsTable
      Events:
        HealthGet:
          Type: Api
          Properties:
            Path: /health
            Method: get
        OrdersPost:
          Type: Api
          Properties:
            Path: /orders
            Method: post
        OrderGet:
          Type: Api
          Properties:
            Path: /orders/{orderId}
            Method: get
        ItemsPost:
          Type: Api
          Properties:
            Path: /items
            Method: post
        ItemGet:
          Type: Api
          Properties:
            Path: /items/{itemId}
            Method: get
        ReservationsPost:
          Type: Api
          Properties:
            Path: /reservations
            Method: post

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: checkout-orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: checkout-idempotency
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotencyKey
          AttributeType: S
      KeySchema:
        - AttributeName: idempotencyKey
          KeyType: HASH

  ItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: checkout-items
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: itemId
          AttributeType: S
      KeySchema:
        - AttributeName: itemId
          KeyType: HASH

  ReservationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: checkout-reservations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: reservationId
          AttributeType: S
      KeySchema:
        - AttributeName: reservationId
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"