AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Checkout Service Lambda

Globals:
  Function:
    Runtime: java17
    MemorySize: 1024
    Timeout: 10
    Architectures:
      - x86_64
    Environment:
      Variables:
        ORDERS_TABLE_NAME: !Ref OrdersTable
        IDEMPOTENCY_TABLE_NAME: !Ref IdempotencyTable
        ITEMS_TABLE_NAME: !Ref ItemsTable

Resources:
  CheckoutApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: checkout-service-api
      StageName: Prod

  CheckoutApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: io.checkout.service.Handler::handleRequest
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ItemsTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt OrdersTable.Arn
                - !GetAtt IdempotencyTable.Arn
                - !GetAtt ItemsTable.Arn
      Events:
        HealthGet:
          Type: Api
          Properties:
            RestApiId: !Ref CheckoutApi
            Path: /health
            Method: get

        ItemsPost:
          Type: Api
          Properties:
            RestApiId: !Ref CheckoutApi
            Path: /items
            Method: post

        ItemGet:
          Type: Api
          Properties:
            RestApiId: !Ref CheckoutApi
            Path: /items/{itemId}
            Method: get

        OrdersPost:
          Type: Api
          Properties:
            RestApiId: !Ref CheckoutApi
            Path: /orders
            Method: post

        OrderGet:
          Type: Api
          Properties:
            RestApiId: !Ref CheckoutApi
            Path: /orders/{orderId}
            Method: get

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: checkout-orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: checkout-idempotency
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotencyKey
          AttributeType: S
      KeySchema:
        - AttributeName: idempotencyKey
          KeyType: HASH

  ItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: checkout-items
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: itemId
          AttributeType: S
      KeySchema:
        - AttributeName: itemId
          KeyType: HASH

  CheckoutWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: checkout-service-web-acl
      Scope: REGIONAL
      Description: IP-based rate limiting for checkout service order lookups
      DefaultAction:
        Allow: {}
      CustomResponseBodies:
        TooManyRequestsBody:
          ContentType: APPLICATION_JSON
          Content: '{"error":"Too Many Requests","message":"Rate limit exceeded"}'
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: checkout-service-web-acl
      Rules:
        - Name: GetOrdersIpRateLimit
          Priority: 0
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                CustomResponseBodyKey: TooManyRequestsBody
          Statement:
            RateBasedStatement:
              # Control rate limit here
              # Set to 10 to demonstrate rate limiting behavior
              # Set to 9999999 to not get in the way of load tests
              Limit: 10
              AggregateKeyType: IP
              EvaluationWindowSec: 60
              ScopeDownStatement:
                AndStatement:
                  Statements:
                    - ByteMatchStatement:
                        FieldToMatch:
                          Method: {}
                        PositionalConstraint: EXACTLY
                        SearchString: GET
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                    - OrStatement:
                        Statements:
                          - ByteMatchStatement:
                              FieldToMatch:
                                UriPath: {}
                              PositionalConstraint: STARTS_WITH
                              SearchString: /Prod/orders/
                              TextTransformations:
                                - Priority: 0
                                  Type: NONE
                          - ByteMatchStatement:
                              FieldToMatch:
                                UriPath: {}
                              PositionalConstraint: STARTS_WITH
                              SearchString: /orders/
                              TextTransformations:
                                - Priority: 0
                                  Type: NONE
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: get-orders-ip-rate-limit

  CheckoutWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    DependsOn:
      - CheckoutApiProdStage
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${CheckoutApi}/stages/Prod"
      WebACLArn: !GetAtt CheckoutWebAcl.Arn

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${CheckoutApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"